  <header class="page-header">
    <div class="container">
      <h1>profil<br>Gerald</h1>
    </div>
  </header>
  <section class="page-content">
    <div class="container">
      <div class="row">
        <div class="col-sm">
          <figure>
            <img src="img/gerald-icon.svg" alt="Gerald touring icon">
            <figcaption>Gerald touring and hiking portfolio icon</figcaption>
          </figure>
          <ul class="form-list">
            <li>Motor touring</li>
            <li>Route planning</li>
            <li>Hiking</li>
            <li>Camping gear</li>
          </ul>
        </div>
        <div class="col-sm">
          <h2>isi data travel profile</h2>
          <form id="profileForm">
            <label for="nama">Nama Lengkap</label>
            <input id="nama" name="nama" type="text" value="Gerald" required>

            <label for="kampus">Kampus</label>
            <input id="kampus" name="kampus" type="text" value="Universitas / Kampus" required>

            <label for="jurusan">Jurusan</label>
            <input id="jurusan" name="jurusan" type="text" value="Adventure Digital Portfolio" required>

            <label for="minat">Minat</label>
            <select id="minat" name="minat">
              <option>Motor Touring</option>
              <option>Route Planning</option>
              <option>Hiking</option>
              <option>Travel Website</option>
            </select>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" value="gerald.adventure@email.id" required>

            <label for="telepon">No. Telepon</label>
            <input id="telepon" name="telepon" type="tel" value="08xxxxxxxxxx">

            <label for="alamat">Alamat</label>
            <input id="alamat" name="alamat" type="text" value="Indonesia">

            <label for="cerita">Tentang Saya</label>
            <textarea id="cerita" name="cerita">Saya membuat portfolio bertema Gerald yang menampilkan touring motor, route planner, hiking log, dan travel website.</textarea>

            <button class="button" type="submit">Tampilkan Profil</button>
            <a class="button" href="index.html">Kembali</a>
          </form>
        </div>
      </div>
    </div>
  </section>
  <footer id="contact">
    <h2>any questions?<br>find me here <br>gerald.adventure@email.id</h2>
    <p>Made for the road - Gerald Touring 2026</p>
  </footer>
  <script src="javascript/js.js"></script>
